{% assign app = include.app %}
<div class="app-card" style="--app-accent: {{ app.accent }}">
  <div class="app-card-header">
    <img class="app-card-icon" src="{{ app.icon }}" alt="{{ app.name }}" loading="lazy">
    <div class="app-card-title-row">
      <h3 class="app-card-name">{{ app.name }}</h3>
      {% if app.status == 'live' %}
        <span class="badge badge-live">LIVE</span>
      {% elsif app.status == 'building' %}
        <span class="badge badge-building">BUILDING</span>
      {% else %}
        <span class="badge badge-planned">PLANNED</span>
      {% endif %}
    </div>
  </div>
  <p class="app-card-tagline">{{ app.tagline }}</p>
  {% if app.app_store_url %}
    <a href="{{ app.app_store_url }}" class="app-card-link" target="_blank" rel="noopener">
      App Store &rarr;
    </a>
  {% endif %}
</div>
