<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">&copy; {{ site.time | date: '%Y' }} taka.goto</div>
    <div class="footer-links">
      {% if site.data.social %}
        {% for link in site.data.social %}
          <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.name }}</a>
        {% endfor %}
      {% else %}
        <a href="https://github.com/TakaGoto" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/TakaGoto" target="_blank" rel="noopener">LinkedIn</a>
      {% endif %}
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </div>
    <div class="footer-links footer-pages">
      <a href="/now/">Now</a>
      <a href="/changelog/">Changelog</a>
      <a href="/uses/">Uses</a>
    </div>
  </div>
</footer>
