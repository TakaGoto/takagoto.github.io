<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jekyll-seo-tag: canonical, OG, Twitter Cards, JSON-LD -->
  {% seo %}

  <!-- Fonts: Space Grotesk + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicons -->
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">

  <link rel="stylesheet" href="/assets/css/main.css">
  {% feed_meta %}
  {% if page.extra_css %}<link rel="stylesheet" href="{{ page.extra_css }}">{% endif %}

  <!-- Dark mode: read preference before paint -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else if (saved === 'dark') {
        document.documentElement.removeAttribute('data-theme');
      } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}
  <script src="/assets/js/theme-toggle.js" defer></script>
  <script src="/assets/js/copy-code.js" defer></script>
  <script src="/assets/js/anchors.js" defer></script>
  <script src="/assets/js/chat.js" defer></script>
  <script data-goatcounter="https://takagoto.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
